<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>ZenOS - Login</title>
    
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    
    <link href="styles.css?v=17" rel="stylesheet" />
  </head>

  <body class="login-body">
    <div class="login-container">
      
      <div class="login-left">
        <div class="art-frame">
          <img src="images/topic.png" alt="Spa Therapy Art" class="art-image" />
        </div>
      </div>

      
      <div class="login-right">
        <div class="login-card" id="formCard">
          
          <div class="form-section active-form" id="loginFormSection">
            <h2 class="form-title">Login</h2>
            <form id="loginForm" onsubmit="event.preventDefault()">
              <div class="form-group">
                <label
                  for="username"
                  class="text-on-surface-variant login-form-label small fw-semibold"
                  >Username</label
                >
                <input
                  type="text"
                  id="username"
                  class="ghost-input form-control"
                  placeholder="Enter your username"
                  required
                  autocomplete="username"
                />
              </div>
              <div class="form-group">
                <label
                  for="password"
                  class="text-on-surface-variant login-form-label small fw-semibold"
                  >Password</label
                >
                <input
                  type="password"
                  id="password"
                  class="ghost-input form-control"
                  placeholder="Enter your password"
                  required
                  autocomplete="current-password"
                />
              </div>
              <div class="helpers-row">
                <label class="checkbox-container">
                  <input
                    type="checkbox"
                    id="rememberMe"
                    class="form-check-input"
                  />
                  <span>Remember password</span>
                </label>
                <a href="#" class="link-forgot" id="btnForgotPassword"
                  >Forgot password?</a
                >
              </div>
              <button
                type="submit"
                class="button w-100"
              >
                <span class="fold"></span>
                <div class="points-wrapper">
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                </div>
                <span class="inner">
                  <i class="fa-solid fa-right-from-bracket me-2"></i> Login
                </span>
              </button>
            </form>
          </div>

          
          <div class="form-section" id="resetFormSection">
            <h2 class="form-title-step">Step 1: Send Verification Code</h2>
            <form id="resetForm" onsubmit="event.preventDefault()">
              <div class="form-group">
                <label
                  for="email"
                  class="text-on-surface-variant login-form-label small fw-semibold"
                  >Email</label
                >
                <input
                  type="email"
                  id="email"
                  class="ghost-input form-control"
                  placeholder="Enter your email address"
                  required
                  autocomplete="email"
                />
              </div>
              <button
                type="submit"
                class="button btn-step-submit w-100"
              >
                <span class="fold"></span>
                <div class="points-wrapper">
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                </div>
                <span class="inner">
                  <i class="fa-regular fa-envelope me-2"></i> Send Verification Code
                </span>
              </button>
              <div class="back-link-container">
                <a href="#" class="link-back" id="btnBackToLogin"
                  >Back to Login</a
                >
              </div>
            </form>
          </div>

          <!-- Step 2: Reset Password -->
          <div class="form-section" id="resetPasswordStep2Section">
            <h2 class="form-title-step">Bước 2: đặt lại mật khẩu</h2>
            <form id="resetPasswordStep2Form" onsubmit="event.preventDefault()">
              <div class="form-group">
                <label
                  for="resetUsername"
                  class="text-on-surface-variant login-form-label small fw-semibold"
                  >Tên đăng nhập</label
                >
                <input
                  type="text"
                  id="resetUsername"
                  class="ghost-input form-control"
                  placeholder="Nhập tên đăng nhập"
                  required
                />
              </div>
              <div class="form-group">
                <label
                  for="resetNewPassword"
                  class="text-on-surface-variant login-form-label small fw-semibold"
                  >Mật khẩu mới</label
                >
                <input
                  type="password"
                  id="resetNewPassword"
                  class="ghost-input form-control"
                  placeholder="Nhập mật khẩu mới"
                  required
                />
              </div>
              <div class="form-group">
                <label
                  for="resetPhone"
                  class="text-on-surface-variant login-form-label small fw-semibold"
                  >Số điện thoại đăng ký</label
                >
                <input
                  type="text"
                  id="resetPhone"
                  class="ghost-input form-control"
                  placeholder="Nhập số điện thoại đăng ký"
                  required
                />
              </div>
              <div class="form-group">
                <label
                  for="resetOtp"
                  class="text-on-surface-variant login-form-label small fw-semibold"
                  >Otp</label
                >
                <input
                  type="text"
                  id="resetOtp"
                  class="ghost-input form-control"
                  placeholder="Nhập mã OTP"
                  required
                />
              </div>
              <button
                type="submit"
                class="button btn-step-submit w-100"
              >
                <span class="fold"></span>
                <div class="points-wrapper">
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                  <i class="point"></i>
                </div>
                <span class="inner">
                  <i class="fa-solid fa-user-plus me-2"></i> Register
                </span>
              </button>
              <div class="back-link-container">
                <a href="#" class="link-back" id="btnStep2BackToLogin"
                  >Back to Login</a
                >
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const loginSection = document.getElementById("loginFormSection");
        const resetSection = document.getElementById("resetFormSection");
        const resetStep2Section = document.getElementById("resetPasswordStep2Section");
        const btnForgotPassword = document.getElementById("btnForgotPassword");
        const btnBackToLogin = document.getElementById("btnBackToLogin");
        const btnStep2BackToLogin = document.getElementById("btnStep2BackToLogin");
        const formCard = document.getElementById("formCard");

        let isTransitioning = false;

        function transitionForms(fromSection, toSection, animationClass = "form-fade-in-slide-up") {
          if (isTransitioning) return;
          isTransitioning = true;

          const initialHeight = formCard.offsetHeight;
          formCard.style.height = `${initialHeight}px`;

          fromSection.classList.add("form-fade-out");

          setTimeout(() => {
            fromSection.classList.remove("active-form", "form-fade-out");
            toSection.classList.add("active-form", animationClass);

            formCard.style.height = "auto";
            const targetHeight = formCard.offsetHeight;
            formCard.style.height = `${initialHeight}px`;

            formCard.offsetHeight; // force reflow
            formCard.style.height = `${targetHeight}px`;

            setTimeout(() => {
              toSection.classList.remove(animationClass);
              formCard.style.height = "auto"; 
              isTransitioning = false;
            }, 350); 
          }, 250);
        }

        // Forgot password click -> transitions to Step 1
        btnForgotPassword.addEventListener("click", (e) => {
          e.preventDefault();
          transitionForms(loginSection, resetSection);
        });

        // Step 1 Back to login click -> transitions to Login
        btnBackToLogin.addEventListener("click", (e) => {
          e.preventDefault();
          transitionForms(resetSection, loginSection, "form-fade-in");
        });

        // Step 2 Back to login click -> transitions to Login
        btnStep2BackToLogin.addEventListener("click", (e) => {
          e.preventDefault();
          transitionForms(resetStep2Section, loginSection, "form-fade-in");
        });

        const loginForm = document.getElementById("loginForm");
        if (loginForm) {
          loginForm.addEventListener("submit", (e) => {
            e.preventDefault();
            window.location.href = "dashboard.html";
          });
        }

        // Submit Step 1 -> transitions to Step 2
        const resetForm = document.getElementById("resetForm");
        if (resetForm) {
          resetForm.addEventListener("submit", (e) => {
            e.preventDefault();
            transitionForms(resetSection, resetStep2Section);
          });
        }

        // Submit Step 2 -> transitions to Login
        const resetPasswordStep2Form = document.getElementById("resetPasswordStep2Form");
        if (resetPasswordStep2Form) {
          resetPasswordStep2Form.addEventListener("submit", (e) => {
            e.preventDefault();
            alert("Password has been reset successfully!");
            transitionForms(resetStep2Section, loginSection, "form-fade-in");
          });
        }
      });
    </script>
  </body>
</html>
