<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>ZenOS - Login</title>
    <!-- Bootstrap 5.3.3 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Font Awesome 6.4.0 (for reliable icon support, standardizing web fonts) -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Custom Styles (shared with index) -->
    <link href="styles.css?v=17" rel="stylesheet" />
  </head>

  <body class="login-body">
    <div class="login-container">
      <!-- Left Panel: Art Frame with SPA image -->
      <div class="login-left">
        <div class="art-frame">
          <img src="images/topic.png" alt="Spa Therapy Art" class="art-image" />
        </div>
      </div>

      <!-- Right Panel: White surface with Login/Reset Cards -->
      <div class="login-right">
        <div class="login-card" id="formCard">
          <!-- Section 1: Login Form -->
          <div class="form-section active-form" id="loginFormSection">
            <h2 class="form-title">Login</h2>
            <form id="loginForm" onsubmit="event.preventDefault()">
              <div class="form-group">
                <label
                  for="username"
                  class="text-on-surface-variant login-form-label small fw-semibold"
                  >Username</label
                >
                <input
                  type="text"
                  id="username"
                  class="ghost-input form-control"
                  placeholder="Enter your username"
                  required
                  autocomplete="username"
                />
              </div>
              <div class="form-group">
                <label
                  for="password"
                  class="text-on-surface-variant login-form-label small fw-semibold"
                  >Password</label
                >
                <input
                  type="password"
                  id="password"
                  class="ghost-input form-control"
                  placeholder="Enter your password"
                  required
                  autocomplete="current-password"
                />
              </div>
              <div class="helpers-row">
                <label class="checkbox-container">
                  <input
                    type="checkbox"
                    id="rememberMe"
                    class="form-check-input"
                  />
                  <span>Remember password</span>
                </label>
                <a href="#" class="link-forgot" id="btnForgotPassword"
                  >Forgot password?</a
                >
              </div>
              <button
                type="submit"
                class="glass-modal-btn-primary btn btn-primary w-100"
              >
                <i class="fa-solid fa-right-from-bracket me-2"></i> Login
              </button>
            </form>
          </div>

          <!-- Section 2: Step 1 Send Verification Code -->
          <div class="form-section" id="resetFormSection">
            <h2 class="form-title-step">
              Step 1: Send Verification Code
            </h2>
            <form id="resetForm" onsubmit="event.preventDefault()">
              <div class="form-group">
                <label
                  for="email"
                  class="text-on-surface-variant login-form-label small fw-semibold"
                  >Email</label
                >
                <input
                  type="email"
                  id="email"
                  class="ghost-input form-control"
                  placeholder="Enter your email address"
                  required
                  autocomplete="email"
                />
              </div>
              <button
                type="submit"
                class="glass-modal-btn-primary btn-step-submit btn btn-primary w-100"
              >
                <i class="fa-regular fa-envelope me-2"></i> Send Verification Code
              </button>
              <div class="back-link-container">
                <a href="#" class="link-back" id="btnBackToLogin"
                  >Back to Login</a
                >
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- JavaScript for Form Transition Animations -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const loginSection = document.getElementById("loginFormSection");
        const resetSection = document.getElementById("resetFormSection");
        const btnForgotPassword = document.getElementById("btnForgotPassword");
        const btnBackToLogin = document.getElementById("btnBackToLogin");
        const formCard = document.getElementById("formCard");

        let isTransitioning = false;

        // Transition from Login to Reset (Step 1)
        btnForgotPassword.addEventListener("click", (e) => {
          e.preventDefault();
          if (isTransitioning) return;
          isTransitioning = true;

          // Lock initial height to prevent layout jumps during transitions
          const initialHeight = formCard.offsetHeight;
          formCard.style.height = `${initialHeight}px`;

          // 1. Fade out the login form (0.2s - 0.3s)
          loginSection.classList.add("form-fade-out");

          setTimeout(() => {
            // Hide login form, reset classes
            loginSection.classList.remove("active-form", "form-fade-out");

            // Show reset form and set state
            resetSection.classList.add("active-form", "form-fade-in-slide-up");

            // Adjust form height dynamically to fit new content
            formCard.style.height = "auto";
            const targetHeight = formCard.offsetHeight;
            formCard.style.height = `${initialHeight}px`;

            // Trigger reflow to apply transition
            formCard.offsetHeight;
            formCard.style.height = `${targetHeight}px`;

            setTimeout(() => {
              resetSection.classList.remove("form-fade-in-slide-up");
              formCard.style.height = "auto"; // release hardcoded height
              isTransitioning = false;
            }, 350); // slide up + fade in duration (0.35s)
          }, 250); // fade out duration (0.25s)
        });

        // Transition from Reset (Step 1) back to Login
        btnBackToLogin.addEventListener("click", (e) => {
          e.preventDefault();
          if (isTransitioning) return;
          isTransitioning = true;

          const initialHeight = formCard.offsetHeight;
          formCard.style.height = `${initialHeight}px`;

          // 1. Fade out the reset form
          resetSection.classList.add("form-fade-out");

          setTimeout(() => {
            resetSection.classList.remove("active-form", "form-fade-out");

            // Show login form with standard fade-in
            loginSection.classList.add("active-form", "form-fade-in");

            formCard.style.height = "auto";
            const targetHeight = formCard.offsetHeight;
            formCard.style.height = `${initialHeight}px`;

            // Trigger reflow
            formCard.offsetHeight;
            formCard.style.height = `${targetHeight}px`;

            setTimeout(() => {
              loginSection.classList.remove("form-fade-in");
              formCard.style.height = "auto"; // release hardcoded height
              isTransitioning = false;
            }, 350); // fade in duration (0.35s)
          }, 250); // fade out duration (0.25s)
        });
        
        // Handle login submit redirect
        const loginForm = document.getElementById("loginForm");
        if (loginForm) {
          loginForm.addEventListener("submit", (e) => {
            e.preventDefault();
            window.location.href = "dashboard.html";
          });
        }

        // Handle password reset submit
        const resetForm = document.getElementById("resetForm");
        if (resetForm) {
          resetForm.addEventListener("submit", (e) => {
            e.preventDefault();
            alert("Verification code has been sent!");
            btnBackToLogin.click();
          });
        }
      });
    </script>
  </body>
</html>
